name: RNapi
options:
  bundleIdPrefix: pl.rnapi
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

packages:
  RNapiKit:
    path: RNapiKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  RNapi:
    type: application
    platform: macOS
    sources:
      - RNapi
    dependencies:
      - package: RNapiKit
        product: RNapiUI
    info:
      path: RNapi/Info.plist
      properties:
        CFBundleName: RNapi
        CFBundleDisplayName: RNapi
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        NSHumanReadableCopyright: "RNapi contributors, GPL-2.0"
        LSMinimumSystemVersion: "15.0"
        # NapiProjekt and Napisy24 are plain-HTTP services.
        NSAppTransportSecurity:
          NSExceptionDomains:
            napiprojekt.pl:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
            napisy24.pl:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        # "Open with RNapi" for video files.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Video File
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.movie
              - public.video
              - public.mpeg-4
              - com.apple.quicktime-movie
              - public.avi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: pl.rnapi.RNapi
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
